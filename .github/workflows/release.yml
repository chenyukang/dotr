name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag to build, for example v0.1.0. Defaults to the current ref."
        required: false
        type: string

env:
  CARGO_TERM_COLOR: always
  BIN_NAME: dotr
  CRATE_NAME: dotr

permissions:
  contents: write

jobs:
  verify:
    name: Verify release
    runs-on: ubuntu-latest
    outputs:
      release_tag: ${{ steps.release.outputs.release_tag }}
      version: ${{ steps.release.outputs.version }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          ref: ${{ inputs.tag || github.ref }}

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2

      - name: Resolve release tag
        id: release
        shell: bash
        run: |
          if [ -n "${{ inputs.tag }}" ]; then
            release_tag="${{ inputs.tag }}"
          else
            release_tag="${GITHUB_REF_NAME}"
          fi
          case "$release_tag" in
            v*) ;;
            *)
              echo "release tag must start with v: $release_tag" >&2
              exit 1
              ;;
          esac
          version="${release_tag#v}"
          crate_version="$(cargo metadata --no-deps --format-version 1 | jq -r '.packages[] | select(.name == env.CRATE_NAME) | .version')"
          if [ "$crate_version" != "$version" ]; then
            echo "tag $release_tag does not match crate version $crate_version" >&2
            exit 1
          fi
          echo "release_tag=$release_tag" >> "$GITHUB_OUTPUT"
          echo "version=$version" >> "$GITHUB_OUTPUT"

      - name: Check formatting
        run: cargo fmt --all -- --check

      - name: Check all targets
        run: cargo check --locked --all-targets

      - name: Clippy
        run: cargo clippy --locked --all-targets -- -D warnings

      - name: Test
        run: cargo test --locked

  build:
    name: Build ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    needs:
      - verify
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            archive: tar
            exe_suffix: ""
          - os: ubuntu-24.04-arm
            target: aarch64-unknown-linux-gnu
            archive: tar
            exe_suffix: ""
          - os: macos-15-intel
            target: x86_64-apple-darwin
            archive: tar
            exe_suffix: ""
          - os: macos-15
            target: aarch64-apple-darwin
            archive: tar
            exe_suffix: ""
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            archive: zip
            exe_suffix: ".exe"
          - os: windows-11-arm
            target: aarch64-pc-windows-msvc
            archive: zip
            exe_suffix: ".exe"
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          ref: ${{ needs.verify.outputs.release_tag }}

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2
        with:
          key: release-${{ matrix.target }}

      - name: Build binary
        run: cargo build --locked --release --target "${{ matrix.target }}"

      - name: Package tar archive
        if: matrix.archive == 'tar'
        shell: bash
        env:
          TARGET: ${{ matrix.target }}
          RELEASE_TAG: ${{ needs.verify.outputs.release_tag }}
        run: |
          asset="${BIN_NAME}-${RELEASE_TAG}-${TARGET}"
          staging="dist/${asset}"
          binary_path="target/${TARGET}/release/${BIN_NAME}"

          mkdir -p "$staging"
          cp "$binary_path" "$staging/"
          cp README.md "$staging/"

          archive_path="dist/${asset}.tar.gz"
          tar -C dist -czf "$archive_path" "$asset"

          if command -v sha256sum >/dev/null 2>&1; then
            sha256sum "$archive_path" > "${archive_path}.sha256"
          else
            shasum -a 256 "$archive_path" > "${archive_path}.sha256"
          fi
          rm -rf "$staging"

      - name: Package zip archive
        if: matrix.archive == 'zip'
        shell: pwsh
        env:
          TARGET: ${{ matrix.target }}
          EXE_SUFFIX: ${{ matrix.exe_suffix }}
          RELEASE_TAG: ${{ needs.verify.outputs.release_tag }}
        run: |
          $asset = "${env:BIN_NAME}-${env:RELEASE_TAG}-${env:TARGET}"
          $staging = "dist/${asset}"
          $binaryPath = "target/${env:TARGET}/release/${env:BIN_NAME}${env:EXE_SUFFIX}"
          $archivePath = "dist/${asset}.zip"

          New-Item -ItemType Directory -Force -Path $staging | Out-Null
          Copy-Item $binaryPath $staging
          Copy-Item README.md $staging
          Compress-Archive -Force -Path "${staging}/*" -DestinationPath $archivePath

          $hash = Get-FileHash -Algorithm SHA256 $archivePath
          "$($hash.Hash.ToLowerInvariant())  $archivePath" | Set-Content -NoNewline "${archivePath}.sha256"
          Remove-Item -Recurse -Force $staging

      - name: Upload release artifact
        uses: actions/upload-artifact@v7
        with:
          name: dotr-${{ matrix.target }}
          path: dist/*
          if-no-files-found: error

  publish:
    name: Publish GitHub release
    runs-on: ubuntu-latest
    needs:
      - verify
      - build
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          ref: ${{ needs.verify.outputs.release_tag }}

      - name: Download release artifacts
        uses: actions/download-artifact@v8
        with:
          path: dist
          merge-multiple: true

      - name: Publish GitHub release
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_TAG: ${{ needs.verify.outputs.release_tag }}
        run: |
          notes_file="$(mktemp)"
          release_notes=".github/release-notes/${RELEASE_TAG}.md"
          if [ -f "$release_notes" ]; then
            cat "$release_notes" > "$notes_file"
            printf '\n\n' >> "$notes_file"
          fi
          {
            printf 'Prebuilt dotr binaries are attached below.\n\n'
            printf 'Install on macOS/Linux:\n'
            printf '```sh\n'
            printf 'curl -fsSL https://raw.githubusercontent.com/%s/main/install.sh | sh\n' "$GITHUB_REPOSITORY"
            printf '```\n\n'
            printf 'Install on Windows PowerShell:\n'
            printf '```powershell\n'
            printf 'iwr https://raw.githubusercontent.com/%s/main/install.ps1 -UseB | iex\n' "$GITHUB_REPOSITORY"
            printf '```\n'
          } >> "$notes_file"

          if gh release view "$RELEASE_TAG" >/dev/null 2>&1; then
            gh release edit "$RELEASE_TAG" \
              --title "dotr $RELEASE_TAG" \
              --notes-file "$notes_file"
            gh release upload "$RELEASE_TAG" dist/* --clobber
          else
            gh release create "$RELEASE_TAG" dist/* \
              --verify-tag \
              --title "dotr $RELEASE_TAG" \
              --notes-file "$notes_file"
          fi
